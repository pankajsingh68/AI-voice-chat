services:
  - type: web
    name: echocoach-backend
    env: python
    region: oregon # or frankfurt, ohio, singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
